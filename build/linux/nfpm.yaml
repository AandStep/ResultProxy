# nfpm config for building .deb and .rpm packages.
# Run: nfpm pkg --packager deb --target ./build/bin/
#      nfpm pkg --packager rpm --target ./build/bin/
#
# The Wails build is expected to have produced ./build/bin/ResultV beforehand.

name: resultv
arch: amd64
platform: linux
version: ${VERSION}
section: net
priority: optional
maintainer: ResultV <andbet18@gmail.com>
description: |
  ResultV proxy client.
homepage: https://resultv.app
license: GPL-3.0
contents:
  - src: ./build/bin/ResultV
    dst: /usr/bin/resultv
    file_info:
      mode: 0755
  - src: ./build/linux/resultv.desktop
    dst: /usr/share/applications/resultv.desktop
  - src: ./public/logo.png
    dst: /usr/share/icons/hicolor/512x512/apps/resultv.png
overrides:
  deb:
    depends:
      - libgtk-3-0
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1
      - libayatana-appindicator-gtk3
