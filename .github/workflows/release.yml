name: Release

on:
  push:
    tags:
      - 'v*' # Запускается автоматически при создании тега, например v2.1.1

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          $goBin = "$(go env GOPATH)/bin"
          "$goBin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          $makensisCandidates = @(
            "C:\ProgramData\chocolatey\bin\makensis.exe",
            "$env:ProgramFiles\NSIS\makensis.exe",
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          )
          $makensis = $null
          foreach ($candidate in $makensisCandidates) {
            if (Test-Path $candidate) {
              $makensis = $candidate
              break
            }
          }
          if (-not $makensis) {
            $found = Get-ChildItem -Path "C:\ProgramData\chocolatey" -Filter "makensis.exe" -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $makensis = $found.FullName
            }
          }
          if (-not $makensis) {
            Write-Error "makensis.exe not found after NSIS installation"
            exit 1
          }
          $nsisRoot = Split-Path -Parent $makensis
          $multiUser = Join-Path $nsisRoot "Include\MultiUser.nsh"
          if (-not (Test-Path $multiUser)) {
            Write-Error "NSIS MultiUser.nsh not found at $multiUser"
            exit 1
          }
          Split-Path -Parent $makensis | Out-File -FilePath $env:GITHUB_PATH -Append
          "NSISDIR=$nsisRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          & $makensis /VERSION

      - name: Build Windows app and installer
        shell: pwsh
        env:
          SUBSCRIPTION_ENCRYPT_KEY: ${{ secrets.SUBSCRIPTION_ENCRYPT_KEY }}
        run: |
          $key = $env:SUBSCRIPTION_ENCRYPT_KEY
          if ($key) {
            wails build -clean -nsis -platform windows/amd64 -ldflags "-X resultproxy-wails/internal/proxy.subscriptionEncryptKey=$key"
          } else {
            Write-Warning "Secret SUBSCRIPTION_ENCRYPT_KEY not set — building without decryption key"
            wails build -clean -nsis -platform windows/amd64
          }

      - name: Validate Windows artifacts
        shell: pwsh
        run: |
          $portable = Get-ChildItem -Path "build/bin" -Filter "*.exe" |
            Where-Object { $_.Name -notlike "*-installer.exe" } |
            Select-Object -First 1
          $installer = Get-ChildItem -Path "build/bin" -Filter "*-installer.exe" | Select-Object -First 1
          if (-not $portable) {
            Write-Error "Portable executable not found in build/bin"
            exit 1
          }
          if (-not $installer) {
            Write-Error "Installer executable not found in build/bin"
            exit 1
          }
          "PORTABLE_PATH=build/bin/$($portable.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "INSTALLER_PATH=build/bin/$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: |
            ${{ env.PORTABLE_PATH }}
            ${{ env.INSTALLER_PATH }}
          retention-days: 1

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build macOS app and .dmg
        env:
          SUBSCRIPTION_ENCRYPT_KEY: ${{ secrets.SUBSCRIPTION_ENCRYPT_KEY }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          chmod +x build-macos.sh
          ./build-macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: build/bin/ResultV.dmg
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            rpm fuse libfuse2

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Install linuxdeploy
        run: |
          curl -fsSL -o /usr/local/bin/linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x /usr/local/bin/linuxdeploy

      - name: Build Linux artifacts
        env:
          SUBSCRIPTION_ENCRYPT_KEY: ${{ secrets.SUBSCRIPTION_ENCRYPT_KEY }}
        run: |
          chmod +x build-linux.sh
          ./build-linux.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: |
            build/bin/*.deb
            build/bin/*.rpm
            build/bin/*.AppImage
          retention-days: 1
          if-no-files-found: warn

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Parse update.json and format Release Data
        id: prepare_release
        run: |
          cat > prepare_release.cjs <<'NODE_EOF'
          const fs = require('fs');
          const update = JSON.parse(fs.readFileSync('update.json', 'utf8'));

          const pickLang = (v, lang) => {
            if (v == null) return '';
            if (typeof v === 'string') return v;
            return v[lang] || v.ru || v.en || Object.values(v)[0] || '';
          };

          const formatBullets = (text) => {
            const t = String(text || '').trim();
            if (!t) return '';
            let out = t.replace(/\. /g, '.\n-');
            if (!out.startsWith('-')) out = '-' + out;
            if (out.endsWith('-')) out = out.slice(0, -1);
            return out;
          };

          const ruNotes = formatBullets(pickLang(update.releaseNotes, 'ru'));
          const enNotes = formatBullets(pickLang(update.releaseNotes, 'en'));
          const ruTitle = pickLang(update.releaseTitle, 'ru').trim() || 'Bug Fixes & Improvements';
          const enTitle = pickLang(update.releaseTitle, 'en').trim() || ruTitle;
          const host = new URL(update.downloadUrl).hostname;

          const sections = [];
          if (ruNotes) {
            sections.push(`Что нового в версии ${update.version}?\n\n${ruNotes}\n\n🌐 Официальный сайт: ${host}`);
          }
          if (enNotes && enNotes !== ruNotes) {
            sections.push(`What's new in version ${update.version}?\n\n${enNotes}\n\n🌐 Official website: ${host}`);
          }
          const releaseBody = sections.join('\n\n---\n\n');
          fs.writeFileSync('RELEASE_BODY.txt', releaseBody);

          const releaseName = enTitle && enTitle !== ruTitle
            ? `ResultV v${update.version} - ${ruTitle} / ${enTitle}`
            : `ResultV v${update.version} - ${ruTitle}`;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `release_name=${releaseName}\n`);
          NODE_EOF
          node prepare_release.cjs

      - name: Download all workflow assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-assets-*
          merge-multiple: true

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.prepare_release.outputs.release_name }}
          body_path: RELEASE_BODY.txt
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
